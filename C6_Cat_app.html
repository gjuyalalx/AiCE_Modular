<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AI Career Catalyst | Smart Prompt Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #eef2f9 0%, #d9e2ef 100%);
      font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', sans-serif;
      padding: 2rem 1.5rem;
      color: #1a2c3e;
    }

    .app-container {
      max-width: 1300px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 2.3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0f2b3d, #1b4f6e, #2c7da0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .hero p {
      color: #2c4c6c;
      margin-top: 0.5rem;
      font-weight: 500;
    }

    .tabs-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 2rem;
      justify-content: center;
      background: #ffffffcc;
      backdrop-filter: blur(10px);
      padding: 1rem 1.2rem;
      border-radius: 60px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid #ffffff;
    }

    .tab-btn {
      background: #eef2fa;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #1f4e6e;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      letter-spacing: 0.3px;
      flex: 0 1 auto;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .tab-btn {
        padding: 10px 18px;
        font-size: 0.8rem;
        white-space: normal;
        text-align: center;
      }
    }

    .tab-btn.active {
      background: #1f6392;
      color: white;
      box-shadow: 0 6px 14px rgba(31,99,146,0.35);
    }

    .tab-btn:hover:not(.active) {
      background: #dfe7f2;
      transform: translateY(-2px);
    }

    .content-panel {
      background: rgba(255,255,255,0.96);
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
      padding: 2rem 2rem 2rem 2rem;
      transition: opacity 0.2s ease, transform 0.25s ease;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .text-segment {
      line-height: 1.5;
    }

    .text-segment p {
      margin-bottom: 1rem;
    }

    .callout {
      background: #eef4fc;
      border-left: 5px solid #2c7da0;
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
      margin: 1.5rem 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
      position: relative;
    }

    .callout-content h {
      font-weight: 800;
      font-size: 1.1rem;
      color: #1a5d7a;
    }

    mark {
      background: #ffe6b3;
      padding: 0 4px;
      border-radius: 12px;
      color: #5a3e00;
    }

    hr {
      margin: 1rem 0;
      border: none;
      border-top: 1px solid #cde0ec;
    }

    .badge-icon {
      display: inline-block;
      background: #eef2ff;
      border-radius: 40px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    @media (max-width: 780px) {
      body {
        padding: 1rem;
      }
      .content-panel {
        padding: 1.2rem;
      }
      .tabs-nav {
        border-radius: 32px;
        padding: 0.8rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="hero">
    <h1>AI Career Catalyst</h1>
    <p>Smart prompts for mission, brand, sales, operations & growth.</p>
  </div>

  <div class="tabs-nav" id="tabsNav"></div>
  <div class="content-panel" id="dynamicPanel">
    <div class="text-segment" style="text-align:center; padding: 2rem;">
      <span class="badge-icon">Assistant ready</span>
      <p>Select a category above to unlock curated prompts & strategies.</p>
    </div>
  </div>
</div>

<script>
  const sections = [
    {
      id: "mission",
      label: "Mission & Vision",
      shortDesc: "Define your personal mission and vision aligned with company goals.",
      promptText: `Act as a highly accomplished professional in [industry], with deep expertise in contributing to organizational success. Define your personal mission and vision, highlighting how your skills and ambitions align with your company's objectives. The mission should clearly describe your role, what you aim to accomplish, and the unique value you bring. Your vision should showcase your long-term goals, illustrating how you see your growth contributing to the company's future. Both statements should be clear, memorable, and reflective of the company's mission and values. They should inspire your colleagues and demonstrate your leadership potential. Ensure that your personal mission and vision are adaptable, allowing room for changes in your role or career path as the company evolves. Please provide a list of questions I need to answer to give you enough context before responding.`
    },
    {
      id: "standout",
      label: "Stand Out in Field",
      shortDesc: "Content ideas to demonstrate expertise and build visibility.",
      promptText: `Act as a Content Strategist. Develop a list of content ideas designed to enhance my personal brand and demonstrate my expertise in [specific industry or field]. The ideas should align with my professional goals and values, driving engagement, establishing thought leadership, and increasing visibility. Consider incorporating diverse formats such as blog posts, social media content, case studies, and thought-provoking articles. Ensure that each idea is actionable, tailored to my audience, and provides clear value. Briefly describe each idea and its potential impact, along with the platforms or channels where it would be most effective in amplifying my profile and organization's visibility. Include any questions I should answer to provide further context for better-targeted suggestions.`
    },
    {
      id: "personalbrand",
      label: "Personal Brand",
      shortDesc: "Build a strong personal brand strategy that aligns with your organization.",
      promptText: `Act as a personal branding expert for professionals. Develop a comprehensive personal branding strategy for [your name/role] within [organization name], aimed at increasing visibility, demonstrating expertise, and fostering career growth while aligning with the company's mission. The strategy should include a detailed analysis of personal strengths, professional achievements, and opportunities for growth. It must also outline actionable steps for building an online presence, creating valuable content, networking with key industry players, and driving personal development. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "socialmedia",
      label: "Social Media Strategy",
      shortDesc: "Tailored strategy for platforms, content, and engagement.",
      promptText: `Act as a social media marketing expert. Develop a comprehensive social media strategy tailored for a professional looking to stand out in their field, while boosting their company's visibility and engagement. The strategy should cover platform selection based on the individual's target audience, content creation and curation, posting frequency, engagement tactics, and performance metrics. Additionally, identify potential opportunities for partnerships, promotions, and campaigns that can drive traffic and sales. Ensure the strategy aligns with both the personal brand and the company's voice and values, offering actionable steps for implementation. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "salespitch",
      label: "Sales Pitch",
      shortDesc: "Craft a persuasive, value-driven product pitch.",
      promptText: `Act as a seasoned salesman. Develop a compelling sales pitch for [product]. Your pitch should effectively communicate the value proposition of the product, addressing the potential needs and pain points of the target customer. Incorporate storytelling techniques to make the pitch relatable and memorable, while highlighting how the use of ChatGPT enhances the pitch's relevance and reach. Ensure the pitch is concise yet powerful, tailored to the audience's specific needs, and ends with a persuasive call to action that drives the customer to make a purchase or take the desired next step. Use your expertise and years of experience to anticipate objections and be prepared to handle them confidently. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "objections",
      label: "Handle Objections",
      shortDesc: "Empathetic, persuasive responses to customer concerns.",
      promptText: `Act as a seasoned professional with expertise in handling objections. Navigate through customer [objections] related to [product/service]. Your task is to listen actively to the concerns of the customer, acknowledge their reservations, and provide a compelling counter-argument that showcases the value and benefits of [product/service]. Use ChatGPT's capabilities to frame the conversation in a way that benefits both your personal growth and your organization's objectives. Guide the conversation towards a positive outcome, always keeping a professional demeanor, and ensure that the customer feels heard and understood. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "operations",
      label: "Operational Efficiency",
      shortDesc: "Streamline workflows, reduce costs, optimize resources.",
      promptText: `Act as an operations manager. Assess and analyze the current operational processes within your role to identify bottlenecks, inefficiencies, and areas for improvement. Develop and implement strategies to streamline workflows, optimize resources, and reduce operational costs, all while ensuring your contributions enhance both your personal growth and the organization's success. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "risk",
      label: "Risk Management",
      shortDesc: "Proactive AI-driven risk identification and mitigation.",
      promptText: `Act as a Business Development Specialist focusing on risk management within an organization. Develop a comprehensive risk management strategy that integrates AI to pro-actively identify and mitigate potential risks in operations, financials, and the broader market environment. Your plan should incorporate AI tools for risk detection and scenario modeling. Assess the likelihood and impact of each identified risk, proposing strategies to mitigate them and leveraging ChatGPT for real-time updates. The strategy should include contingency plans for unforeseen challenges, with a review mechanism that ensures regular adjustments to the risk management framework. Ensure the approach aligns with both personal career goals and the organization's objectives. Please provide a list of questions I need to answer to offer the necessary context for crafting the strategy.`
    },
    {
      id: "budget",
      label: "Budgeting",
      shortDesc: "Optimize budget allocation for team/department growth.",
      promptText: `Act as a Financial Advisor. Develop a comprehensive budget allocation strategy for a team or department within your organization for the upcoming fiscal year. Analyze past financial data, current economic trends, and any potential future expenses. Take into consideration the team's goals, growth prospects, and risk appetite. The allocation should be optimized to enhance both personal productivity and organizational outcomes. Provide detailed recommendations on areas of investment, savings, and any necessary cutbacks. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "productideas",
      label: "Product Ideas",
      shortDesc: "Innovative product concepts based on market trends.",
      promptText: `Act as a creative expert specializing in product ideation. Brainstorm innovative product ideas tailored for [business]. Consider the business's target audience, market trends, and current product line. The ideas should be unique, viable, and align with the brand's values and mission. Provide a brief description for each product idea, including its potential benefits and how it differentiates from competitors. Ensure that the ideas cater to the current market demands and have the potential to drive sales, elevate your role in the organization, and enhance the brand's reputation. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "marketgaps",
      label: "Market Gaps",
      shortDesc: "Identify untapped opportunities and competitive advantages.",
      promptText: `Act as a business development specialist. Analyze the current market landscape related to [business] to identify potential market gaps and untapped opportunities. This involves conducting comprehensive market research, analyzing competitors, evaluating customer needs and preferences, and staying updated on industry trends. Once you've gathered relevant data, create a detailed report highlighting the identified gaps, supported by data-driven insights. Propose actionable strategies to capitalize on these opportunities to enhance both your personal role and the organization's competitive edge. Please provide a list of questions I need to answer so you have enough context before answering.`
    },
    {
      id: "growth",
      label: "Growth Opportunities",
      shortDesc: "Unlock personal & company-wide growth with AI analysis.",
      promptText: `Act as a growth expert specializing in innovative solutions within established organizations. Analyze the current status, operations, and market positioning of the employee's role within the company. Identify potential growth opportunities, untapped segments, and areas for both personal development and company-wide improvement. Provide actionable strategies to leverage these opportunities, focusing on enhancing productivity, building personal expertise, and supporting overall business growth. Ensure the recommendations are practical, cost-effective, and directly tied to the employee's impact on the organization's goals. Present findings in a clear, organized manner with actionable steps for personal and organizational development. Please provide a list of questions I need to answer so you have enough context before answering.`
    }
  ];

  const panelEl = document.getElementById('dynamicPanel');
  let currentActiveId = sections[0].id;

  function generateSectionHTML(section) {
    return `
      <div class="text-segment">
        <span class="badge-icon">${section.label}</span>
        <p>${section.shortDesc}</p>
        <div class="callout">
          <div class="callout-content">
            <h>Prompt:</h><br>
            <p id="prompt-${section.id}-text">${section.promptText}</p>
          </div>
        </div>
        <hr />
        <p style="font-size:0.75rem; color:#5f7f9c; margin-top:1rem;">Tip: copy the prompt, replace placeholders, and ask ChatGPT for follow-up questions.<br>Designed at ALX</p>
      </div>
    `;
  }

  function animatePanelChange(newHtmlContent) {
    if (!panelEl) return;
    panelEl.style.opacity = '0';
    panelEl.style.transform = 'translateY(8px)';
    setTimeout(() => {
      panelEl.innerHTML = newHtmlContent;
      panelEl.offsetHeight;
      panelEl.style.opacity = '1';
      panelEl.style.transform = 'translateY(0px)';
    }, 180);
  }

  function renderSection(sectionId) {
    const section = sections.find(s => s.id === sectionId);
    if (!section) return;
    currentActiveId = sectionId;
    const wrapper = generateSectionHTML(section);
    animatePanelChange(wrapper);
    updateActiveTab(sectionId);
  }

  function updateActiveTab(activeId) {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if (btn.dataset.id === activeId) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
  }

  function buildTabs() {
    const nav = document.getElementById('tabsNav');
    nav.innerHTML = '';
    sections.forEach(section => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn';
      if (section.id === currentActiveId) btn.classList.add('active');
      btn.dataset.id = section.id;
      btn.textContent = section.label;
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentActiveId === section.id) return;
        renderSection(section.id);
      });
      nav.appendChild(btn);
    });
  }

  buildTabs();
  renderSection('mission');
</script>
</body>
</html>
