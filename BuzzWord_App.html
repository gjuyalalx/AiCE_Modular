<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI buzz</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', system-ui, sans-serif;
}

body {
  background: #eef3f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.glass-panel {
  width: 520px;
  padding: 2rem;
}

/* HEADER */
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title-section {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

h1 {
  font-size: 1.8rem;
  color: #122b44;
}

.chip {
  background: rgba(43,110,215,0.1);
  color: #2b6ed7;
  padding: 0.3rem 0.8rem;
  border-radius: 100px;
  font-size: 0.75rem;
}

.counter-badge {
  background: #122b44;
  color: white;
  border-radius: 40px;
  padding: 0.6rem 1.2rem;
  display: flex;
  gap: 0.4rem;
  align-items: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.counter-number {
  font-size: 1.8rem;
  font-weight: 600;
}

/* PROGRESS */
.progress-hint {
  margin: 1.5rem 0;
  height: 6px;
  background: rgba(0,0,0,0.08);
  border-radius: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg,#2b6ed7,#8fb9ff);
  border-radius: 10px;
  transform-origin: left;
}

/* INPUT */
.input-label {
  font-size: 0.9rem;
  color: #1e3b5c;
  margin-bottom: 0.5rem;
}

.input-row {
  display: flex;
  gap: 0.8rem;
}

#wordInput {
  flex: 1;
  padding: 1rem;
  border-radius: 40px;
  border: 2px solid #2b6ed7;
  font-size: 1rem;
  outline: none;
  box-shadow: 0 6px 14px rgba(43,110,215,0.2);
}

.action-btn {
  background: #122b44;
  color: white;
  border: none;
  padding: 1rem 1.6rem;
  border-radius: 40px;
  font-weight: 600;
  display: flex;
  gap: 0.3rem;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 6px 14px rgba(0,0,0,0.2);
}

/* GIVE UP */
.giveup-btn {
  width: 100%;
  margin-top: 0.8rem;
  padding: 0.7rem;
  border-radius: 40px;
  border: 1px dashed #c9353e;
  opacity: 0.5;
  cursor: not-allowed;
}

.giveup-btn.active {
  opacity: 1;
  background: #c9353e;
  color: white;
  cursor: pointer;
}

.countdown {
  color: #2b6ed7;
  font-weight: 600;
}

/* ANSWERS */
.answers-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
  justify-content: center;
}

.answer-chip {
  padding: 0.4rem 0.9rem;
  border-radius: 999px;
  background: rgba(30,91,166,0.08);
  border: 1px solid rgba(30,91,166,0.2);
  font-size: 0.85rem;
  animation: fadeInUp 0.3s ease both;
}

@keyframes fadeInUp {
  from { opacity:0; transform: translateY(6px);}
  to { opacity:1; transform: translateY(0);}
}

.footer-note {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.75rem;
  color: #5f7a9c;
}
</style>
</head>

<body>

<div class="glass-panel">

  <div class="header-row">
    <div class="title-section">
      <h1>AI buzz</h1>
      <div class="chip">knowledge check</div>
    </div>

    <div class="counter-badge">
      <span>left</span>
      <span class="counter-number" id="counterDisplay">20</span>
    </div>
  </div>

  <div class="progress-hint">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="input-label">🤖 guess an AI buzzword</div>

  <div class="input-row">
    <input id="wordInput" placeholder="e.g. neural network">
    <button class="action-btn" id="checkBtn">
      check ⏎
    </button>
  </div>

  <!-- GIVE UP -->
<button class="giveup-btn" id="giveUpBtn" disabled style="color:#E3174D;">
  I give up (<span class="countdown">90s</span>)
</button>

  <div id="messageArea"></div>

  <div class="footer-note">
    20 buzzwords · find them all<br>
    Developed by ALX
  </div>

</div>

<script>
(function(){

const MASTER_LIST = [
'machine learning','neural network','deep learning','algorithm',
'agentic ai','llm','ai governance','nlp',
'computer vision','generative ai','prompting','gpt',
'reinforcement learning','multimodal ai','ai ethics',
'training data','vibe coding','hallucination','ai slop','token'
];

let remainingWords=[...MASTER_LIST];

const wordInput=document.getElementById('wordInput');
const checkBtn=document.getElementById('checkBtn');
const messageArea=document.getElementById('messageArea');
const giveUpBtn=document.getElementById('giveUpBtn');
const counterDisplay=document.getElementById('counterDisplay');
const progressFill=document.getElementById('progressFill');

function updateUI(){
  counterDisplay.textContent=remainingWords.length;
  progressFill.style.transform=`scaleX(${remainingWords.length/20})`;
}

function handleGuess(){
  const val=wordInput.value.trim().toLowerCase();

  if(!MASTER_LIST.includes(val)){
    messageArea.innerText="try again";
    return;
  }

  if(!remainingWords.includes(val)){
    messageArea.innerText="already guessed";
    return;
  }

  remainingWords=remainingWords.filter(w=>w!==val);
  updateUI();
  messageArea.innerText="correct!";
  wordInput.value="";
}

checkBtn.onclick=handleGuess;

wordInput.addEventListener('keydown',(e)=>{
  if(e.key==='Enter'){
    e.preventDefault();
    handleGuess();
  }
});

/* COUNTDOWN */
let timer=90;
const countdownEl=giveUpBtn.querySelector('.countdown');

let interval=setInterval(()=>{
  timer--;
  if(timer>0){
    countdownEl.textContent=`${timer}s`;
  } else {
    clearInterval(interval);
    giveUpBtn.disabled=false;
    giveUpBtn.classList.add('active');
    giveUpBtn.textContent='Reveal answers';
  }
},1000);

/* REVEAL */
function revealAnswers(){

  const container=document.createElement('div');
  container.className='answers-grid';

  MASTER_LIST.forEach((word,i)=>{
    const chip=document.createElement('div');
    chip.className='answer-chip';
    chip.textContent=word;
    chip.style.animationDelay=`${i*0.02}s`;
    container.appendChild(chip);
  });

  messageArea.innerHTML='';
  messageArea.appendChild(container);

  checkBtn.disabled=true;
  wordInput.disabled=true;
}

giveUpBtn.onclick=()=>{
  if(!giveUpBtn.disabled){
    revealAnswers();
  }
};

updateUI();

})();
</script>

</body>
</html>
